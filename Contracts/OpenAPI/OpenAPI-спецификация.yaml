openapi: 3.0.0
info:
  title: Микросервис Вклады (msa_deposit)
  description: |
    Микросервис для управления банковскими вкладами.
    Возможности: открытие вкладов, расчет параметров вкладов (процентная ставка, срок, сумма),
    изменение параметров вкладов, учет правил капитализации процентов,
    предоставление информации о доступных продуктах, мониторинг сроков действия вкладов,
    расчет доходности, автоматическая пролонгация по условиям.
  version: 1.0.0

servers:
  - url: http://localhost:8080/api

paths:
  /deposit/calculate:
    post:
      summary: Расчет вклада
      description: |
        Пользователь в калькуляторе вкладов на фронтенде вводит параметры вклада
        (сумма пополнения, срок, процентная ставка, возможность пополнения).
        Микросервис рассчитывает условия: ожидаемую доходность в конце срока
        и доступную процентную ставку.
      operationId: calculateDeposit
      tags:
        - Вклады
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
                - termMonths
                - interestRate
                - canBeRefilled
              properties:
                amount:
                  type: number
                  minimum: 0
                  description: Сумма пополнения (первоначальный взнос)
                  example: 50000
                termMonths:
                  type: integer
                  minimum: 1
                  maximum: 60
                  description: Срок вклада в месяцах
                  example: 12
                interestRate:
                  type: number
                  minimum: 0
                  maximum: 30
                  description: Процентная ставка (% годовых)
                  example: 8.5
                canBeRefilled:
                  type: boolean
                  description: Возможность пополнения вклада
                  example: true
      responses:
        '200':
          description: Успешный расчет
          content:
            application/json:
              schema:
                type: object
                properties:
                  expectedReturn:
                    type: number
                    description: Ожидаемая доходность в конце срока
                    example: 4250.50
                  availableRate:
                    type: number
                    description: Доступная процентная ставка
                    example: 8.5
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /deposit/prepare:
    post:
      summary: Подготовка вклада
      description: |
        После подтверждения клиентом условий вклада микросервис создает договор для подписания.
        Для этого запрашивает в мкс Клиенты (msa_client) дополнительные данные:
        ФИО клиента, паспортные данные и др., затем оформляет договор
        и отправляет на подпись клиенту.
      operationId: prepareDeposit
      tags:
        - Вклады
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - clientId
                - depositParams
              properties:
                clientId:
                  type: string
                  description: Идентификатор клиента
                  example: "CL-12345"
                depositParams:
                  type: object
                  description: Параметры выбранного вклада
                  properties:
                    amount:
                      type: number
                      example: 50000
                    termMonths:
                      type: integer
                      example: 12
                    interestRate:
                      type: number
                      example: 8.5
                    canBeRefilled:
                      type: boolean
                      example: true
      responses:
        '200':
          description: Договор создан и отправлен на подпись
          content:
            application/json:
              schema:
                type: object
                properties:
                  contractId:
                    type: string
                    description: Идентификатор созданного договора
                    example: "CTR-789"
                  status:
                    type: string
                    enum: [pending_signature]
                    description: Статус договора
                    example: "pending_signature"
                  message:
                    type: string
                    description: Сообщение для клиента
                    example: "Договор отправлен на подпись электронной подписью"
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Клиент не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /deposit/open:
    post:
      summary: Открытие счета вклада
      description: |
        После подписания клиентом договора электронной подписью (нажатие кнопки "Подписать"),
        микросервис сохраняет информацию о договоре в мкс Договоры (msa_contract),
        открывает счет вклада в мкс Счета (msa_account) и отправляет на фронтенд
        подтверждение об открытии счета.
      operationId: openDepositAccount
      tags:
        - Вклады
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - contractId
                - signedByClient
              properties:
                contractId:
                  type: string
                  description: Идентификатор подписанного договора
                  example: "CTR-789"
                signedByClient:
                  type: boolean
                  description: Подтверждение подписания клиентом
                  example: true
                signatureData:
                  type: string
                  description: Данные электронной подписи (опционально)
                  example: "base64encodedsignature..."
      responses:
        '200':
          description: Счет успешно открыт
          content:
            application/json:
              schema:
                type: object
                properties:
                  accountId:
                    type: string
                    description: Идентификатор открытого счета вклада
                    example: "ACC-456"
                  contractId:
                    type: string
                    description: Идентификатор договора
                    example: "CTR-789"
                  status:
                    type: string
                    enum: [active, pending_activation]
                    description: Статус счета
                    example: "pending_activation"
                  message:
                    type: string
                    description: Подтверждение для фронтенда
                    example: "Счет вклада успешно открыт. Для активации пополните счет"
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Договор не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /deposit/activate:
    post:
      summary: Активация счета
      description: |
        После указания клиентом счета для пополнения вклада, микросервис проверяет
        наличие необходимой суммы на счете и активирует вклад.
        Затем передает данные о новом вкладе:
        - во внутреннюю систему бухгалтерии банка (accounts_department)
        - во внешнюю систему ФНС (tax_service)
      operationId: activateDeposit
      tags:
        - Вклады
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - accountId
                - fundingAccountId
              properties:
                accountId:
                  type: string
                  description: Идентификатор счета вклада (открытого ранее)
                  example: "ACC-456"
                fundingAccountId:
                  type: string
                  description: Счет клиента, с которого будет пополнение
                  example: "ACC-FUND-001"
                amountToDeposit:
                  type: number
                  description: Сумма для пополнения (если не указана, используется сумма из договора)
                  example: 50000
      responses:
        '200':
          description: Вклад успешно активирован
          content:
            application/json:
              schema:
                type: object
                properties:
                  accountId:
                    type: string
                    example: "ACC-456"
                  status:
                    type: string
                    enum: [activated]
                    description: Статус вклада
                    example: "activated"
                  activationDate:
                    type: string
                    format: date-time
                    description: Дата активации
                    example: "2026-04-13T10:30:00Z"
                  maturityDate:
                    type: string
                    format: date-time
                    description: Дата окончания вклада
                    example: "2027-04-13T10:30:00Z"
                  notificationsSent:
                    type: object
                    description: Статус отправки уведомлений во внешние системы
                    properties:
                      accountsDepartment:
                        type: boolean
                        description: Уведомление в бухгалтерию банка
                        example: true
                      taxService:
                        type: boolean
                        description: Уведомление в ФНС
                        example: true
        '400':
          description: Ошибка валидации или недостаточно средств
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - type: object
                    properties:
                      error:
                        type: string
                        example: "Недостаточно средств на счете пополнения"
                      code:
                        type: string
                        example: "INSUFFICIENT_FUNDS"
        '404':
          description: Счет вклада не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Текст ошибки
          example: "Произошла ошибка"
        code:
          type: string
          description: Код ошибки
          example: "ERROR_CODE"

  responses:
    BadRequest:
      description: Неверный запрос — ошибка валидации
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'